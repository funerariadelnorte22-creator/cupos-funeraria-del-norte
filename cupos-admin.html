<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Funeraria del Norte — Panel de carga (privado)</title>
<style>
  :root{
    --petroleo: #1B2A5B;
    --petroleo-2: #24397A;
    --hueso: #F6F9FC;
    --hueso-2: #E3EDF6;
    --ambar: #8DC63F;
    --ambar-suave: #29B6E8;
    --texto-suave: #5B6B8C;
    --linea: rgba(23,50,58,0.12);
    --ok: #6FA82E;
    --error: #B0413E;
    --font-display: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family: var(--font-body); background: var(--hueso); color: var(--petroleo); min-height: 100vh; padding: 40px 20px 60px; }
  .wrap{ max-width: 460px; margin: 0 auto; }
  img.logo{ display:block; max-width: 170px; width:100%; height:auto; margin: 0 auto 18px; }
  .eyebrow{ font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--texto-suave); margin-bottom: 6px; text-align:center; }
  h1{ font-family: var(--font-display); font-weight:400; font-size: 22px; text-align:center; margin-bottom: 6px; }
  .warn{ font-size: 12px; color: var(--texto-suave); text-align:center; margin-bottom: 30px; }
  .panel{ background: #fff; border: 1px solid var(--linea); border-radius: 4px; padding: 26px 24px; }
  label{ display:block; font-size: 12px; color: var(--texto-suave); margin-bottom: 4px; margin-top: 14px; }
  input, select{ width:100%; padding: 9px 10px; border: 1px solid var(--linea); border-radius: 3px; font-size: 14px; background: var(--hueso); color: var(--petroleo); }
  .row-btns{ display:flex; gap:10px; margin-top: 18px; }
  button{ flex:1; padding: 10px; border: none; border-radius: 3px; font-size: 13px; letter-spacing: 0.5px; cursor:pointer; }
  .btn-primary{ background: var(--petroleo); color: var(--hueso); }
  .btn-primary:hover{ background: var(--petroleo-2); }
  .btn-secondary{ background: var(--hueso-2); color: var(--petroleo); }
  .msg{ font-size: 12px; margin-top: 10px; min-height: 14px; }
  hr{ margin:22px 0; border:none; border-top:1px solid var(--linea); }
  h3{ font-family: var(--font-display); font-weight:400; font-size: 16px; }
  #userGreeting{ font-size:12px; color:var(--texto-suave); margin-bottom:10px; }
  .accent-strip{ height: 5px; width:100%; max-width:460px; margin: 0 auto 24px; border-radius:3px; background: linear-gradient(90deg, #29B6E8, #8DC63F); }
</style>

  <div class="accent-strip"></div>
  <div class="eyebrow">Funeraria del Norte</div>
  <h1>Panel de carga — uso privado</h1>
  <div class="warn">Esta página no está enlazada desde ningún lado público. No compartas este link con afiliados.</div>

  <div class="panel">
    <div id="lockView">
      <label>Clave de acceso</label>
      <input type="password" id="pwInput" placeholder="Ingresá tu clave">
      <div class="row-btns"><button class="btn-primary" id="pwSubmit">Entrar</button></div>
      <div class="msg" id="lockMsg"></div>
    </div>

    <div id="editView" style="display:none;">
      <div id="userGreeting"></div>
      <label>Plan</label>
      <select id="planSelect"></select>
      <label>Cantidad actual de afiliados</label>
      <input type="number" id="countInput" min="0">
      <div class="row-btns">
        <button class="btn-secondary" id="logoutBtn">Cerrar sesión</button>
        <button class="btn-primary" id="saveBtn">Guardar</button>
      </div>
      <div class="msg" id="saveMsg"></div>

      <hr>
      <h3>Crear usuario autorizado</h3>
      <label>Nombre</label>
      <input type="text" id="newUserName" placeholder="Ej: María, responsable de Wanda">
      <label>Clave para esa persona</label>
      <input type="text" id="newUserPass" placeholder="Clave propia, distinta a las demás">
      <div class="row-btns"><button class="btn-primary" id="addUserBtn">Crear usuario</button></div>
      <div class="msg" id="userMsg"></div>
    </div>
  </div>
</div>

<script>
const PLANS = [
  { id: 'corporativo', nombre: 'Plan Bienestar Corporativo' },
  { id: 'dorado',       nombre: 'Plan Bienestar Dorado' },
  { id: 'amistad',      nombre: 'Programa Amistad' },
  { id: 'comercial',    nombre: 'Plan Bienestar Comercial' },
  { id: 'docente',      nombre: 'Programa de Respaldo Docente' },
];
const API_URL = 'https://script.google.com/macros/s/AKfycbz1GIEVVThGX2t77tvBO_4hgnhPdfLaZBGgH5dng6pppW0Qwq_CqJ683pHeL9cpeIRvwQ/exec';

let currentUser = null;
let currentPassword = null; // se guarda solo en memoria, mientras dura la sesión

async function apiGet(params){
  const url = new URL(API_URL);
  Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
  const res = await fetch(url.toString());
  return res.json();
}

async function fetchCupos(){
  const data = await apiGet({ action: 'getCupos' });
  return data.cupos || {};
}

function fillPlanSelect(){
  const sel = document.getElementById('planSelect');
  sel.innerHTML = PLANS.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
}
async function loadCountIntoInput(){
  const planId = document.getElementById('planSelect').value;
  const cupos = await fetchCupos();
  document.getElementById('countInput').value = (cupos[planId] && cupos[planId].count) || 0;
}

document.getElementById('pwSubmit').addEventListener('click', async () => {
  const val = document.getElementById('pwInput').value;
  const lockMsg = document.getElementById('lockMsg');
  lockMsg.textContent = 'Verificando...';
  lockMsg.style.color = 'var(--texto-suave)';
  try{
    const result = await apiGet({ action: 'login', password: val });
    if(result.ok){
      currentUser = result.nombre;
      currentPassword = val;
      document.getElementById('lockView').style.display = 'none';
      document.getElementById('editView').style.display = 'block';
      document.getElementById('userGreeting').textContent = 'Ingresaste como: ' + currentUser;
      fillPlanSelect();
      loadCountIntoInput();
    } else {
      document.getElementById('pwInput').value = '';
      lockMsg.textContent = 'Clave incorrecta';
      lockMsg.style.color = 'var(--error)';
    }
  }catch(e){
    lockMsg.textContent = 'No se pudo conectar con el servidor, probá de nuevo';
    lockMsg.style.color = 'var(--error)';
  }
});

document.getElementById('planSelect').addEventListener('change', loadCountIntoInput);

document.getElementById('logoutBtn').addEventListener('click', () => {
  currentUser = null;
  currentPassword = null;
  document.getElementById('editView').style.display = 'none';
  document.getElementById('lockView').style.display = 'block';
  document.getElementById('pwInput').value = '';
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  const planId = document.getElementById('planSelect').value;
  const val = parseInt(document.getElementById('countInput').value, 10) || 0;
  const msg = document.getElementById('saveMsg');
  msg.textContent = 'Guardando...';
  msg.style.color = 'var(--texto-suave)';
  try{
    const result = await apiGet({ action: 'setCupo', planId, count: val, password: currentPassword });
    if(result.ok){
      msg.textContent = 'Guardado ✓';
      msg.style.color = 'var(--ok)';
      setTimeout(() => { msg.textContent = ''; }, 2000);
    } else {
      msg.textContent = 'No se pudo guardar: ' + (result.error || 'error desconocido');
      msg.style.color = 'var(--error)';
    }
  }catch(e){
    msg.textContent = 'Error de conexión, intentá de nuevo';
    msg.style.color = 'var(--error)';
  }
});

document.getElementById('addUserBtn').addEventListener('click', async () => {
  const nombre = document.getElementById('newUserName').value.trim();
  const clave = document.getElementById('newUserPass').value.trim();
  const msg = document.getElementById('userMsg');
  if(!nombre || !clave){
    msg.textContent = 'Completá nombre y clave';
    msg.style.color = 'var(--error)';
    return;
  }
  msg.textContent = 'Creando...';
  msg.style.color = 'var(--texto-suave)';
  try{
    const result = await apiGet({ action: 'addUser', nombre, clave, password: currentPassword });
    if(result.ok){
      document.getElementById('newUserName').value = '';
      document.getElementById('newUserPass').value = '';
      msg.textContent = 'Usuario "' + nombre + '" creado ✓';
      msg.style.color = 'var(--ok)';
    } else {
      msg.textContent = 'No se pudo crear: ' + (result.error || 'error desconocido');
      msg.style.color = 'var(--error)';
    }
  }catch(e){
    msg.textContent = 'Error de conexión, intentá de nuevo';
    msg.style.color = 'var(--error)';
  }
});
</script>
</body>
